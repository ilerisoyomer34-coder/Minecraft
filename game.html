<!DOCTYPE html>
<html style="background:#000;">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="color-scheme" content="dark"/>
<title>Minecraft</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap">
<style>
html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#000;}
#game_frame{width:100%;height:100%;}

#splash{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:#000;z-index:9999;
  display:flex;align-items:center;justify-content:center;
  transition:opacity 0.8s;
  pointer-events:none;
}
#splash-text{
  font-family:'Press Start 2P',monospace;
  font-size:clamp(32px,7vw,96px);
  color:#fff;
  text-shadow:
    4px  4px 0 #555,
    8px  8px 0 #333,
    -2px -2px 0 #888;
  letter-spacing:8px;
  image-rendering:pixelated;
  transition:opacity 0.6s;
}

/* Crosshair - sadece pointer lock aktifken göster */
#crosshair{
  display:none;
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:20px;height:20px;
  pointer-events:none;z-index:8000;
}
#crosshair::before,#crosshair::after{
  content:'';position:absolute;background:#fff;opacity:0.85;
}
#crosshair::before{width:2px;height:100%;left:50%;transform:translateX(-50%);}
#crosshair::after{width:100%;height:2px;top:50%;transform:translateY(-50%);}

/* Mobil kontrol butonları */
#mobile-controls{
  display:none;
  position:fixed;bottom:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:7000;
}
/* Hareket pad — sol alt */
#move-pad{
  position:absolute;bottom:30px;left:20px;
  width:150px;height:150px;
  pointer-events:all;
}
.mv-btn{
  position:absolute;
  width:46px;height:46px;
  background:rgba(255,255,255,0.18);
  border:2px solid rgba(255,255,255,0.4);
  border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;color:#fff;
  user-select:none;-webkit-user-select:none;
  touch-action:none;
}
#btn-w{top:0;left:52px;}
#btn-a{top:52px;left:0;}
#btn-s{top:52px;left:52px;}
#btn-d{top:52px;left:104px;}

/* Aksiyon butonları — sağ alt */
#action-pad{
  position:absolute;bottom:30px;right:20px;
  display:flex;flex-direction:column;gap:10px;
  align-items:center;pointer-events:all;
}
.ac-btn{
  width:54px;height:54px;
  background:rgba(255,255,255,0.18);
  border:2px solid rgba(255,255,255,0.4);
  border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;color:#fff;font-family:sans-serif;font-weight:bold;
  user-select:none;-webkit-user-select:none;
  touch-action:none;
}
</style>
</head>
<body>
<div id="game_frame"></div>
<div class="_eaglercraftX_wrapper_element"></div>
<div id="_eaglercraftX_crashReason" style="display:none;"></div>
<div id="_eaglercraftX_crashUserAgent" style="display:none;"></div>

<div id="splash"><div id="splash-text">ACIBADEM</div></div>
<div id="crosshair"></div>

<!-- Mobil kontroller -->
<div id="mobile-controls">
  <div id="move-pad">
    <div class="mv-btn" id="btn-w">▲</div>
    <div class="mv-btn" id="btn-a">◀</div>
    <div class="mv-btn" id="btn-s">▼</div>
    <div class="mv-btn" id="btn-d">▶</div>
  </div>
  <div id="action-pad">
    <div class="ac-btn" id="btn-jump">⬆<br><span style="font-size:9px">ZIPLA</span></div>
    <div class="ac-btn" id="btn-attack">⚔<br><span style="font-size:9px">VURMA</span></div>
    <div class="ac-btn" id="btn-use">🧱<br><span style="font-size:9px">KOY</span></div>
  </div>
</div>

<script>
// Splash: ACIBADEM → 5/A → kapat
var st = document.getElementById('splash-text');
var sp = document.getElementById('splash');
setTimeout(function(){
  st.style.opacity='0';
  setTimeout(function(){ st.textContent='5/A'; st.style.opacity='1'; },600);
},4000);
setTimeout(function(){
  sp.style.opacity='0';
  setTimeout(function(){ sp.style.display='none'; },800);
},8000);

// Canvas yazı override
var _ft = CanvasRenderingContext2D.prototype.fillText;
CanvasRenderingContext2D.prototype.fillText = function(t,x,y,m){
  if(typeof t==='string') t=t.replace(/eaglercraft/gi,'ACIBADEM').replace(/eagtekx?/gi,'ACIBADEM').replace(/mojang/gi,'5/A');
  return m!==undefined?_ft.call(this,t,x,y,m):_ft.call(this,t,x,y);
};
</script>

<script src="/Minecraft/classes_custom.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mece188/feh@main/fix-webm-duration.js"></script>
<script>
// Crosshair — pointer lock aktifken göster, EaglerCraft kendi lock'unu yönetir
(function(){
  var crosshair = document.getElementById('crosshair');
  document.addEventListener('pointerlockchange', function(){
    crosshair.style.display = document.pointerLockElement ? 'block' : 'none';
  });
})();

// Mobil dokunmatik kontroller
(function(){
  var isMobile = ('ontouchstart' in window);
  if(!isMobile) return;

  document.getElementById('mobile-controls').style.display = 'block';

  function getCanvas(){ return document.querySelector('#game_frame canvas'); }

  // --- movementX/Y override: EaglerCraft'ın mouse delta okumasını yakala ---
  var descX = Object.getOwnPropertyDescriptor(MouseEvent.prototype, 'movementX');
  var descY = Object.getOwnPropertyDescriptor(MouseEvent.prototype, 'movementY');
  Object.defineProperty(MouseEvent.prototype, 'movementX', {
    get: function(){ return '_mx' in this ? this._mx : (descX ? descX.get.call(this) : 0); },
    configurable: true
  });
  Object.defineProperty(MouseEvent.prototype, 'movementY', {
    get: function(){ return '_my' in this ? this._my : (descY ? descY.get.call(this) : 0); },
    configurable: true
  });

  // pointerLockElement: dokunurken canvas gibi davran
  var fakeCanvas = null;
  var isTouching = false;
  var origPLE = Object.getOwnPropertyDescriptor(Document.prototype, 'pointerLockElement')
             || Object.getOwnPropertyDescriptor(document, 'pointerLockElement');
  Object.defineProperty(document, 'pointerLockElement', {
    get: function(){
      if(isTouching && fakeCanvas) return fakeCanvas;
      return origPLE ? origPLE.get.call(this) : null;
    },
    configurable: true
  });

  // --- Sürükle → kamera dön ---
  var lastTX = 0, lastTY = 0;
  var lookZone = document.getElementById('game_frame'); // sağ yarı sürükle = bak

  document.addEventListener('touchstart', function(e){
    var c = getCanvas();
    if(!c) return;
    fakeCanvas = c;
    isTouching = true;
    lastTX = e.touches[0].clientX;
    lastTY = e.touches[0].clientY;
  }, {passive: true});

  document.addEventListener('touchmove', function(e){
    if(!isTouching) return;
    var c = getCanvas();
    if(!c) return;
    var dx = (e.touches[0].clientX - lastTX) * 2;
    var dy = (e.touches[0].clientY - lastTY) * 2;
    lastTX = e.touches[0].clientX;
    lastTY = e.touches[0].clientY;
    var evt = new MouseEvent('mousemove', {bubbles:true, cancelable:true, clientX: lastTX, clientY: lastTY});
    evt._mx = dx; evt._my = dy;
    c.dispatchEvent(evt);
    e.preventDefault();
  }, {passive: false});

  document.addEventListener('touchend', function(){
    isTouching = false;
  }, {passive: true});

  // --- Hareket butonları → klavye simülasyonu ---
  var keyMap = {
    'btn-w': 'KeyW', 'btn-a': 'KeyA',
    'btn-s': 'KeyS', 'btn-d': 'KeyD',
    'btn-jump': 'Space'
  };

  function sendKey(code, down){
    var type = down ? 'keydown' : 'keyup';
    document.dispatchEvent(new KeyboardEvent(type, {code: code, key: code, bubbles: true, cancelable: true}));
  }

  Object.keys(keyMap).forEach(function(id){
    var el = document.getElementById(id);
    if(!el) return;
    el.addEventListener('touchstart', function(e){ sendKey(keyMap[id], true); e.stopPropagation(); }, {passive: true});
    el.addEventListener('touchend',   function(e){ sendKey(keyMap[id], false); e.stopPropagation(); }, {passive: true});
  });

  // --- Vurma (sol tık) ve blok koyma (sağ tık) ---
  document.getElementById('btn-attack').addEventListener('touchstart', function(e){
    var c = getCanvas(); if(!c) return;
    c.dispatchEvent(new MouseEvent('mousedown', {bubbles:true, cancelable:true, button:0, buttons:1}));
    e.stopPropagation();
  }, {passive: true});
  document.getElementById('btn-attack').addEventListener('touchend', function(e){
    var c = getCanvas(); if(!c) return;
    c.dispatchEvent(new MouseEvent('mouseup', {bubbles:true, cancelable:true, button:0, buttons:0}));
    e.stopPropagation();
  }, {passive: true});

  document.getElementById('btn-use').addEventListener('touchstart', function(e){
    var c = getCanvas(); if(!c) return;
    c.dispatchEvent(new MouseEvent('mousedown', {bubbles:true, cancelable:true, button:2, buttons:2}));
    e.stopPropagation();
  }, {passive: true});
  document.getElementById('btn-use').addEventListener('touchend', function(e){
    var c = getCanvas(); if(!c) return;
    c.dispatchEvent(new MouseEvent('mouseup', {bubbles:true, cancelable:true, button:2, buttons:0}));
    e.stopPropagation();
  }, {passive: true});
})();

// Shift → sağ tık (blok koyma)
(function(){
  function getCanvas(){
    return document.querySelector('#game_frame canvas');
  }
  document.addEventListener('keydown', function(e){
    if(e.code === 'ShiftLeft' || e.code === 'ShiftRight'){
      var c = getCanvas();
      if(!c || !document.pointerLockElement) return;
      c.dispatchEvent(new MouseEvent('mousedown', {bubbles:true, cancelable:true, button:2, buttons:2}));
    }
  });
  document.addEventListener('keyup', function(e){
    if(e.code === 'ShiftLeft' || e.code === 'ShiftRight'){
      var c = getCanvas();
      if(!c) return;
      c.dispatchEvent(new MouseEvent('mouseup', {bubbles:true, cancelable:true, button:2, buttons:0}));
    }
  });
})();

window.addEventListener('load', function() {
  window.ACIBADEMXOpts = window.eaglercraftXOpts = {
    container: "game_frame",
    assetsURI: "https://cdn.jsdelivr.net/gh/mece188/feh@main/assets.epk",
    localesURI: "lang/",
    servers: [
      { addr: "wss://mc.arch.lol/", name: "ArchMC" },
      { addr: "wss://1b2t.eagler.host", name: "1 Builder 2 Tools" }
    ]
  };
  try { main(); } catch(e){ console.error(e); }
});
</script>
</body>
</html>
